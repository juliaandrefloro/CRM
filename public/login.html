<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRM Tarot 🔮 — Login</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #0f0c1a;
  color: #e2d9f3;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Fundo com gradiente sutil */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(124, 58, 237, 0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.06) 0%, transparent 50%);
  pointer-events: none;
}

.login-card {
  background: #18122a;
  border: 1px solid #3d2d5a;
  border-radius: 20px;
  padding: 40px 36px;
  width: 100%;
  max-width: 400px;
  position: relative;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
}

.logo {
  text-align: center;
  margin-bottom: 32px;
}

.logo-icon {
  font-size: 48px;
  display: block;
  margin-bottom: 10px;
  filter: drop-shadow(0 0 12px rgba(139, 92, 246, 0.6));
}

.logo h1 {
  font-size: 22px;
  font-weight: 700;
  color: #c9a8f0;
  letter-spacing: -0.3px;
}

.logo p {
  font-size: 13px;
  color: #6b4fa0;
  margin-top: 4px;
}

.form-group {
  margin-bottom: 18px;
}

.form-group label {
  display: block;
  font-size: 13px;
  color: #9f8ab8;
  margin-bottom: 7px;
  font-weight: 500;
}

.form-group input {
  width: 100%;
  padding: 12px 14px;
  background: #0f0c1a;
  border: 1px solid #3d2d5a;
  border-radius: 10px;
  color: #e2d9f3;
  font-size: 14px;
  font-family: inherit;
  transition: border-color 0.15s;
}

.form-group input:focus {
  outline: none;
  border-color: #7c3aed;
  box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
}

.form-group input::placeholder {
  color: #4c3575;
}

.btn-login {
  width: 100%;
  padding: 13px;
  background: #7c3aed;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  margin-top: 8px;
  letter-spacing: 0.2px;
}

.btn-login:hover {
  background: #6d28d9;
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(124, 58, 237, 0.4);
}

.btn-login:active {
  transform: translateY(0);
}

.btn-login:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.error-msg {
  display: none;
  background: #450a0a;
  border: 1px solid #7f1d1d;
  color: #fca5a5;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  margin-bottom: 16px;
  text-align: center;
}

.error-msg.show {
  display: block;
}

.divider {
  height: 1px;
  background: #2d2040;
  margin: 24px 0;
}

.footer-text {
  text-align: center;
  font-size: 12px;
  color: #4c3575;
}

/* Animação de carregamento no botão */
@keyframes spin {
  to { transform: rotate(360deg); }
}

.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">
    <span class="logo-icon">🔮</span>
    <h1>CRM Tarot</h1>
    <p>Painel de Controle</p>
  </div>

  <div class="error-msg" id="error-msg">
    E-mail ou senha incorretos. Tente novamente.
  </div>

  <form id="login-form" autocomplete="on">
    <div class="form-group">
      <label for="email">E-mail</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="seu@email.com"
        autocomplete="username"
        required
      />
    </div>

    <div class="form-group">
      <label for="password">Senha</label>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="••••••••"
        autocomplete="current-password"
        required
      />
    </div>

    <button type="submit" class="btn-login" id="btn-login">
      Entrar no Painel
    </button>
  </form>

  <div class="divider"></div>

  <p class="footer-text">🌙 Vitória Mística · Tarot CRM v1.0</p>
</div>

<script>
const form    = document.getElementById('login-form');
const btn     = document.getElementById('btn-login');
const errMsg  = document.getElementById('error-msg');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errMsg.classList.remove('show');

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Entrando...';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
      credentials: 'same-origin',
    });

    if (res.ok) {
      // Redireciona para o painel
      window.location.href = '/';
    } else {
      const data = await res.json();
      errMsg.textContent = data.error || 'E-mail ou senha incorretos.';
      errMsg.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = 'Entrar no Painel';
    }
  } catch (err) {
    errMsg.textContent = 'Erro de conexão. Tente novamente.';
    errMsg.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = 'Entrar no Painel';
  }
});
</script>

</body>
</html>
